<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    {% seo title=false %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header">
      <a class="site-brand" href="{{ "/" | relative_url }}" aria-label="{{ site.title | default: "Home" }}">
        {{ site.title | default: "Jiwoo Shin" }}
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="#education">Education</a>
        <a href="#publications">Publications</a>
        <a href="#recognition">Awards</a>
      </nav>
    </header>
    <main id="main">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p>&copy; {{ "now" | date: "%Y" }} Jiwoo Shin.</p>
      <div class="social-links" aria-label="Social links">
        <a href="https://github.com/chuu-shin" aria-label="GitHub">
          <img src="/assets/img/github.png" alt="">
        </a>
        <a href="https://www.linkedin.com/in/jiwoo-shin-0030a1217" aria-label="LinkedIn">
          <img src="/assets/img/linkedin.png" alt="">
        </a>
        <a href="/assets/documents/cv_jiwooshin.pdf" aria-label="CV">
          <img src="/assets/img/cv.png" alt="">
        </a>
      </div>
    </footer>
  </body>
</html>
